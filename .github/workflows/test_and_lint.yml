name: Lint and Build

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - 'main'
      - 'dev'

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env file for Prisma
        run: |
          echo "DATABASE_URL=postgresql://user:password@localhost:5432/db?schema=public" > .env

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Lint & format check
        run: pnpm run check

      # - name: Run tests
      #   run: pnpm run test

      - name: Build
        run: pnpm run build
